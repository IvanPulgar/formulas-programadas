<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <h1>{{ title }}</h1>
    <p>Biblioteca de fórmulas de teoría de colas</p>
    <span class="formula-count-badge">{{ total_formulas }} fórmulas</span>
  </header>

  <main>
    {% from 'partials/carousel.html' import carousel %}

    {% for group in carousels %}
      {{ carousel(group) }}
    {% endfor %}
  </main>

  <!-- Demo mode configuration (dormant) -->
  <script>
    window.__DEMO_MODE__ = {{ 'true' if demo_mode else 'false' }};
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
